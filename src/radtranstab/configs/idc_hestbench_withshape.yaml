seed: 42

experiment:
  name: pretrain_transtab_idc_hestbench_cellseg
  project_name: rapacl-radtranstab
  save_config: true

paths:
  data_root: /root/workspace/datasets/prepared_tabular/v0.2.0_withshape_tocelltype/IDC_HESTBENCH
  output_root: /root/workspace/RaPaCL/src/radtranstab/outputs/IDC_HESTBENCH_WITHSHAPE
  log_dir: /root/workspace/RaPaCL/src/radtranstab/outputs/IDC_HESTBENCH_WITHSHAPE/logs
  checkpoint_dir: /root/workspace/RaPaCL/src/radtranstab/outputs/IDC_HESTBENCH_WITHSHAPE/checkpoints

# runtime:
#   device: cuda:0
runtime:
  device: cuda
  distributed: true

train:
  batch_size: 32
  max_epochs: 50
  lr: 0.0001
  num_workers: 4
  optimizer_name: adamw
  weight_decay: 0.0
  patience: 5 # 50 
  eval_batch_size: 256
  warmup_ratio: null
  warmup_steps: null
  eval_metric: val_loss
  eval_less_is_better: true

model:
  type: transtab_cl
  hidden_dim: 128
  num_layer: 2
  num_attention_head: 8
  ffn_dim: 256
  hidden_dropout_prob: 0.0
  activation: relu

  projection_dim: 128
  num_partition: 3
  overlap_ratio: 0.5
  supervised: true ### 
  ignore_duplicate_cols: true

data:
  dataset_type: custom
  data_csv: data_processed.csv
  numerical_feature_file: numerical_feature.txt
  binary_feature_file: null
  target_col: target_label

