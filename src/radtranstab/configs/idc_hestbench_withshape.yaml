# CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 -m src.radtranstab.pipelines.pretrain --config src/radtranstab/configs/idc_hestbench_cellseg.yaml --mode train

# python -m src.radtranstab.pipelines.pretrain --config src/radtranstab/configs/idc_hestbench_cellseg.yaml --mode train --distributed false


evaluation:
  # checkpoint_name: extractor # null이면 가장 최근 checkpoint dir 사용
  split: test
  batch_size: 256
  methods: [umap, tsne]
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  tsne_perplexity: 30

